[model]
provider = "openrouter"

[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
model = "openai/gpt-5.4-nano"
api_key_env = "OPENROUTER_API_KEY"

[runtime]
cache = true
thinking = "high"

[tools]
enabled = ["fs_read", "fs_write", "fs_list", "fs_stat", "fs_edit", "fs_rename", "fs_delete", "sh_exec"]

[skills]
disabled = []

[agent_md]
enabled = true
